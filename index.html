<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="./js/app.js"></script>
    <link rel="stylesheet" href="./css/style.css" />
    <title>Document</title>
  </head>
  <body>
    <header>
      <h1>Library Management System</h1>
    </header>
    <main>
      <div>
        <form id="add-book-form">
          <label for="title-input">Book Title</label>
          <input
            type="text"
            placeholder="Enter the book title"
            id="title-input"
          />

          <label for="author-input">Book Author</label>
          <input
            type="text"
            placeholder="Enter the book author"
            id="author-input"
          />

          <label for="isbn-input">Book ISBN number</label>
          <input
            type="number"
            placeholder="Enter the book ISBN number"
            id="isbn-input"
          />

          <label for="genre-input">Book Genre</label>
          <input
            type="text"
            placeholder="Enter the book genre"
            id="genre-input"
          />

          <button type="submit" id="add-book-btn">Add Book</button>
        </form>
      </div>
      <div class="search-field">
        <form id="search-form">
          <label for="search-input">Search for a title</label>
          <input
            type="search"
            placeholder="Search Book Title Here"
            id="search-input"
          />
          <button type="submit" id="book-search-btn">Search</button>
        </form>
      </div>
      <div class="filter-buttons">
        <p>filter by</p>
        <button id="filter-all-btn">All</button>
        <button id="filter-borrowed-btn">borrowed</button>
        <button id="filter-available-btn">Avaiable</button>
        <button id="filter-ebook-btn">E-Books</button>
      </div>
      <div id="books-container"></div>
    </main>
  </body>
</html>
